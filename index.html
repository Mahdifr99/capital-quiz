<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capitals Test app</title>
    <link rel="stylesheet" href="style.css" />
    <!-- <script defer src="script.js"></script> -->
    <script defer src="OOPscript.js"></script>
    <!-- <script defer src="other.js"></script> -->
  </head>
  <body>
    <header class="header">
      <h1></h1>
      <h1 class="heading">Capital capital game for Amir Najjar!</h1>
      <h2 class="timer hidden">10</h2>
    </header>
    <div class="start-container">
      <button class="btn start-btn">Start</button>
    </div>
    <main class="hidden">
      <h2 class="title-q">Choose the right capital</h2>
      <h1 class="question"></h1>
      <ul class="options"></ul>
      <div class="bottom">
        <h3 class="status"></h3>
        <button class="next-btn hidden btn">Next ⏭️</button>
      </div>
      <div class="answer-count">
        <h3 class="true-answers">
          True Answers:<span class="true-answers-count">0</span>
        </h3>
        <h3 class="false-answers">
          false Answers:<span class="false-answers-count">0</span>
        </h3>
        <h3 class="highest-score"></h3>
        <h3 class="last-score"></h3>
      </div>
      <button class="reset-btn btn hidden">Reset test</button>
    </main>
  </body>
</html>
